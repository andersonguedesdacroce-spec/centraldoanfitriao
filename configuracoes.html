<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Central do Anfitrião</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden hidden" id="body-config">

    <!-- Sidebar (Menu Lateral) -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <i class="fa-solid fa-house-chimney text-blue-500 text-xl mr-2"></i>
            <span class="font-bold text-lg">Central Anfitrião</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-solid fa-chart-pie w-6"></i> Dashboard
            </a>
            <a href="#" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-regular fa-calendar-alt w-6"></i> Calendário
            </a>
            <!-- Aba Configurações agora está destacada em azul -->
            <a href="configuracoes.html" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg">
                <i class="fa-solid fa-gear w-6"></i> Configurações
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="btn-sair" class="flex items-center w-full px-4 py-2 text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-right-from-bracket w-6"></i> Sair
            </button>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold text-gray-800">Configurações do Imóvel</h1>
        </header>

        <!-- Formulário de Configuração -->
        <div class="p-8 max-w-3xl">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                
                <form id="form-config" class="space-y-6">
                    
                    <h2 class="text-lg font-bold text-gray-900 border-b pb-2">Informações da Página</h2>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Título do Anúncio</label>
                        <input type="text" id="titulo" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Ex: Apartamento Premium no Coração da Cidade">
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Valor da Diária Base (R$)</label>
                            <input type="number" id="diaria" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none" placeholder="250">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Taxa de Limpeza (R$)</label>
                            <input type="number" id="limpeza" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none" placeholder="100">
                        </div>
                    </div>

                    <h2 class="text-lg font-bold text-gray-900 border-b pb-2 mt-8">Recebimento e Contato</h2>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp para receber Reservas</label>
                        <input type="text" id="whatsapp" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none" placeholder="5511999999999">
                        <p class="text-xs text-gray-500 mt-1">Coloque o código do país (55) + DDD + Número. Apenas números.</p>
                    </div>

                    <div class="pt-4 flex items-center justify-between">
                        <span id="mensagem-sucesso" class="text-green-600 font-medium text-sm hidden"><i class="fa-solid fa-check-circle mr-1"></i> Salvo com sucesso!</span>
                        <button type="submit" id="btn-salvar" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition ml-auto">
                            Salvar Configurações
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </main>

    <!-- Script de Lógica e Conexão -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        // Importamos as funções de Documento (doc, setDoc, getDoc) em vez de Coleção
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Suas chaves
        const firebaseConfig = {
            apiKey: "AIzaSyBsQS5f4TK-SWBV22Y6CfAimgAxgeOhcWQ",
            authDomain: "central-do-anfitriao.firebaseapp.com",
            projectId: "central-do-anfitriao",
            storageBucket: "central-do-anfitriao.firebasestorage.app",
            messagingSenderId: "625070810610",
            appId: "1:625070810610:web:9f12968b89c666d332b76b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let usuarioLogadoUid = null;

        // 1. VERIFICA LOGIN E CARREGA DADOS
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('body-config').classList.remove('hidden');
                usuarioLogadoUid = user.uid; // Pegamos o ID único desse anfitrião
                
                // Busca os dados antigos no banco para preencher o formulário
                const docRef = doc(db, "Anfitriao", usuarioLogadoUid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    document.getElementById('titulo').value = dados.tituloImovel || "";
                    document.getElementById('diaria').value = dados.valorDiaria || "";
                    document.getElementById('limpeza').value = dados.taxaLimpeza || "";
                    document.getElementById('whatsapp').value = dados.telefoneWhatsapp || "";
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        // 2. SALVAR NO BANCO DE DADOS
        document.getElementById('form-config').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-salvar');
            const msg = document.getElementById('mensagem-sucesso');
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                // Montamos o objeto com os dados da tela
                const dadosParaSalvar = {
                    tituloImovel: document.getElementById('titulo').value,
                    valorDiaria: Number(document.getElementById('diaria').value),
                    taxaLimpeza: Number(document.getElementById('limpeza').value),
                    telefoneWhatsapp: document.getElementById('whatsapp').value,
                    atualizado_em: new Date()
                };

                // Salvamos usando a tabela "Anfitriao" e o UID como ID da linha
                await setDoc(doc(db, "Anfitriao", usuarioLogadoUid), dadosParaSalvar, { merge: true });

                msg.classList.remove('hidden');
                setTimeout(() => msg.classList.add('hidden'), 3000); // Esconde a mensagem verde após 3 segundos
            } catch (error) {
                console.error("Erro ao salvar config: ", error);
                alert("Erro ao salvar. Verifique o console.");
            } finally {
                btn.innerText = "Salvar Configurações";
                btn.disabled = false;
            }
        });

        // Logout
        document.getElementById('btn-sair').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        });
    </script>
</body>
</html>
