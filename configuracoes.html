<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Imóveis - Central do Anfitrião</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden hidden" id="body-config">

    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <i class="fa-solid fa-house-chimney text-blue-500 text-xl mr-2"></i>
            <span class="font-bold text-lg">Central Anfitrião</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-solid fa-chart-pie w-6"></i> Dashboard
            </a>
            <a href="calendario.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-regular fa-calendar-alt w-6"></i> Calendário
            </a>
            <a href="configuracoes.html" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg">
                <i class="fa-solid fa-house-user w-6"></i> Meus Imóveis
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="btn-sair" class="flex items-center w-full px-4 py-2 text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-right-from-bracket w-6"></i> Sair
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold text-gray-800">Meus Imóveis</h1>
            <button onclick="abrirMeuCatalogo()" class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg font-medium transition text-sm flex items-center shadow-sm">
                <i class="fa-solid fa-link mr-2"></i> Link do meu Catálogo
            </button>
        </header>

        <div class="p-8 max-w-5xl mx-auto w-full">
            
            <div class="mb-8">
                <h2 class="text-lg font-bold text-gray-900 mb-4">Imóveis Ativos</h2>
                <div id="lista-imoveis" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="col-span-full text-center py-8 text-gray-500 bg-white rounded-xl border border-gray-100">
                        Carregando seus imóveis...
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                <h2 class="text-lg font-bold text-gray-900 border-b pb-2 mb-6"><i class="fa-solid fa-plus text-blue-600 mr-2"></i> Adicionar Novo Imóvel</h2>
                
                <form id="form-imovel" class="space-y-6">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Título do Anúncio</label>
                        <input type="text" id="titulo" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição Profissional</label>
                        <textarea id="descricao" required rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Valor da Diária (R$)</label>
                            <input type="number" id="diaria" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Taxa de Limpeza (R$)</label>
                            <input type="number" id="limpeza" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp para Contato</label>
                        <input type="text" id="whatsapp" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 outline-none">
                    </div>

                    <div class="border border-gray-200 rounded-lg p-5 bg-gray-50">
                        <label class="block text-sm font-bold text-gray-800 mb-2">Galeria de Fotos</label>
                        <p class="text-xs text-gray-500 mb-4">Adicione fotos, arraste para reordenar (a primeira será a capa) e classifique os ambientes.</p>
                        
                        <div class="mb-4">
                            <label class="cursor-pointer bg-blue-100 text-blue-700 hover:bg-blue-200 px-4 py-2 rounded-lg text-sm font-semibold inline-flex items-center transition">
                                <i class="fa-solid fa-camera mr-2"></i> Escolher Fotos
                                <input type="file" id="fotos-input" accept="image/*" multiple class="hidden">
                            </label>
                        </div>

                        <div id="preview-container" class="space-y-2 min-h-[100px] border-2 border-dashed border-gray-300 rounded-lg p-2 bg-white">
                            <div id="preview-vazio" class="text-center text-gray-400 py-6 text-sm">
                                Nenhuma foto adicionada ainda.
                            </div>
                        </div>
                    </div>

                    <div class="pt-4 flex justify-end">
                        <button type="submit" id="btn-salvar" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition disabled:bg-gray-400">
                            Cadastrar Imóvel
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsQS5f4TK-SWBV22Y6CfAimgAxgeOhcWQ",
            authDomain: "central-do-anfitriao.firebaseapp.com",
            projectId: "central-do-anfitriao",
            storageBucket: "central-do-anfitriao.firebasestorage.app",
            messagingSenderId: "625070810610",
            appId: "1:625070810610:web:9f12968b89c666d332b76b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let usuarioLogadoUid = null;

        // --- SISTEMA DE FOTOS EM MEMÓRIA ---
        // Usamos um Map para guardar o arquivo real de imagem vinculado a um ID único
        const arquivosEmMemoria = new Map();
        
        // Ativando o arrastar e soltar (Drag and Drop)
        const previewContainer = document.getElementById('preview-container');
        new Sortable(previewContainer, {
            animation: 150,
            ghostClass: 'opacity-50' // Efeito visual ao arrastar
        });

        // Quando o usuário escolhe arquivos
        document.getElementById('fotos-input').addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            if(files.length > 0) document.getElementById('preview-vazio').classList.add('hidden');

            files.forEach(file => {
                const idUnico = 'img_' + Date.now() + Math.random().toString(36).substring(7);
                arquivosEmMemoria.set(idUnico, file); // Salva o arquivo na memória

                // Cria o "Card" da miniatura
                const div = document.createElement('div');
                div.className = 'item-foto flex items-center gap-4 bg-gray-50 p-3 border border-gray-200 rounded-lg cursor-move shadow-sm';
                div.dataset.id = idUnico; // Guarda o ID para acharmos na hora de salvar
                
                div.innerHTML = `
                    <div class="text-gray-400 cursor-grab px-2 hover:text-blue-500 transition"><i class="fa-solid fa-grip-vertical"></i></div>
                    <img src="${URL.createObjectURL(file)}" class="w-16 h-16 object-cover rounded shadow-sm border border-gray-300">
                    <div class="flex-1">
                        <select class="select-ambiente w-full md:w-1/2 text-sm p-2 border border-gray-300 rounded outline-none focus:border-blue-500 bg-white cursor-pointer">
                            <option value="Fachada / Exterior">Fachada / Exterior</option>
                            <option value="Sala de Estar">Sala de Estar</option>
                            <option value="Quarto">Quarto</option>
                            <option value="Cozinha">Cozinha</option>
                            <option value="Banheiro">Banheiro</option>
                            <option value="Área de Lazer">Área de Lazer</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <button type="button" onclick="removerFotoDaMemoria('${idUnico}', this)" class="text-red-500 hover:bg-red-50 p-2 rounded transition">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                previewContainer.appendChild(div);
            });
            e.target.value = ''; // Reseta o input para permitir selecionar a mesma foto de novo se quiser
        });

        // Função global para remover a foto da lista antes de salvar
        window.removerFotoDaMemoria = function(id, btnElement) {
            arquivosEmMemoria.delete(id); // Remove da memória
            btnElement.closest('.item-foto').remove(); // Remove da tela
            
            if(arquivosEmMemoria.size === 0) {
                document.getElementById('preview-vazio').classList.remove('hidden');
            }
        };
        // -----------------------------------

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('body-config').classList.remove('hidden');
                usuarioLogadoUid = user.uid; 
                carregarImoveis();
            } else {
                window.location.href = 'login.html';
            }
        });

        async function carregarImoveis() {
            const lista = document.getElementById('lista-imoveis');
            try {
                const q = query(collection(db, "Imoveis"), where("id_anfitriao", "==", usuarioLogadoUid));
                const querySnapshot = await getDocs(q);
                lista.innerHTML = '';

                if (querySnapshot.empty) {
                    lista.innerHTML = `<div class="col-span-full text-center py-8 text-gray-500 bg-white rounded-xl border border-gray-100">Você ainda não tem nenhum imóvel cadastrado.</div>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const imovel = doc.data();
                    const idImovel = doc.id;
                    const linkCompartilhar = `imovel.html?id=${idImovel}`;
                    
                    const urlFotoExibir = (imovel.fotos_urls && imovel.fotos_urls.length > 0) 
                        ? imovel.fotos_urls[0] 
                        : 'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&q=80&w=600';

                    const card = `
                        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden shadow-sm flex flex-col">
                            <div class="h-40 bg-gray-200 relative">
                                <img src="${urlFotoExibir}" class="w-full h-full object-cover">
                                <div class="absolute bottom-2 right-2 bg-black/60 text-white text-xs px-2 py-1 rounded-full">
                                    <i class="fa-regular fa-images mr-1"></i> ${imovel.fotos_urls ? imovel.fotos_urls.length : 0}
                                </div>
                            </div>
                            <div class="p-4 flex-1 flex flex-col">
                                <h3 class="font-bold text-gray-900 mb-1 truncate">${imovel.titulo}</h3>
                                <p class="text-sm text-gray-500 mb-4">Diária: R$ ${imovel.diaria}</p>
                                <div class="mt-auto pt-4 border-t border-gray-100">
                                    <a href="${linkCompartilhar}" target="_blank" class="block w-full text-center bg-gray-50 hover:bg-gray-100 text-blue-600 font-medium py-2 rounded transition border border-gray-200 text-sm">
                                        <i class="fa-solid fa-arrow-up-right-from-square mr-1"></i> Ver Página
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                    lista.innerHTML += card;
                });
            } catch (error) {
                console.error("Erro ao buscar imóveis: ", error);
            }
        }

        // SALVAR IMÓVEL COM A NOVA LÓGICA DE ORDEM E CLASSIFICAÇÃO
        document.getElementById('form-imovel').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-salvar');
            // Busca todos os itens que estão visualmente na tela, NA EXATA ORDEM em que foram arrastados
            const elementosNaTela = document.querySelectorAll('.item-foto');
            
            if(elementosNaTela.length === 0) {
                alert("Por favor, adicione pelo menos uma foto do imóvel.");
                return;
            }

            btn.innerText = `Fazendo upload de ${elementosNaTela.length} foto(s)...`;
            btn.disabled = true;

            try {
                let urlsSimples = []; // Array de strings (para compatibilidade com a galeria antiga)
                let fotosDetalhadas = []; // Array de objetos { url, ambiente }

                // Percorremos os elementos da tela para respeitar a ordem do Drag and Drop
                for (let i = 0; i < elementosNaTela.length; i++) {
                    const divDom = elementosNaTela[i];
                    const idDaFoto = divDom.dataset.id;
                    const ambienteEscolhido = divDom.querySelector('.select-ambiente').value;
                    
                    const arquivoReal = arquivosEmMemoria.get(idDaFoto);

                    // Upload para o Storage
                    const nomeUnico = `${Date.now()}_${i}_${arquivoReal.name}`;
                    const pastaRef = ref(storage, `fotos_imoveis/${usuarioLogadoUid}/${nomeUnico}`);
                    
                    const snapshot = await uploadBytes(pastaRef, arquivoReal);
                    const linkDownload = await getDownloadURL(snapshot.ref);

                    // Salva nas duas estruturas
                    urlsSimples.push(linkDownload);
                    fotosDetalhadas.push({
                        url: linkDownload,
                        ambiente: ambienteEscolhido
                    });
                }

                btn.innerText = "Salvando no Banco de Dados...";

                await addDoc(collection(db, "Imoveis"), {
                    id_anfitriao: usuarioLogadoUid,
                    titulo: document.getElementById('titulo').value,
                    descricao: document.getElementById('descricao').value,
                    diaria: Number(document.getElementById('diaria').value),
                    limpeza: Number(document.getElementById('limpeza').value),
                    whatsapp: document.getElementById('whatsapp').value,
                    fotos_urls: urlsSimples, // Lista simples
                    fotos_detalhes: fotosDetalhadas, // Lista rica (com os comodos)
                    criado_em: new Date()
                });

                // Reseta tudo após sucesso
                document.getElementById('form-imovel').reset();
                document.getElementById('preview-container').innerHTML = `<div id="preview-vazio" class="text-center text-gray-400 py-6 text-sm">Nenhuma foto adicionada ainda.</div>`;
                arquivosEmMemoria.clear();
                
                carregarImoveis();
                alert("Imóvel cadastrado com sucesso! As fotos foram salvas na ordem exata.");

            } catch (error) {
                console.error("Erro no cadastro: ", error);
                alert("Erro ao salvar. Verifique sua conexão.");
            } finally {
                btn.innerText = "Cadastrar Imóvel";
                btn.disabled = false;
            }
        });

        window.abrirMeuCatalogo = function() {
            if (usuarioLogadoUid) { window.open(`catalogo.html?host=${usuarioLogadoUid}`, '_blank'); }
        };

        document.getElementById('btn-sair').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        });
    </script>
</body>
</html>
