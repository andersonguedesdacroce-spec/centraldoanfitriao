<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário - Central do Anfitrião</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Biblioteca FullCalendar (Visual do Calendário) -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden hidden" id="body-calendario">

    <!-- Sidebar (Menu Lateral) -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <i class="fa-solid fa-house-chimney text-blue-500 text-xl mr-2"></i>
            <span class="font-bold text-lg">Central Anfitrião</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-solid fa-chart-pie w-6"></i> Dashboard
            </a>
            <!-- Aba Calendário agora está destacada em azul -->
            <a href="calendario.html" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg">
                <i class="fa-regular fa-calendar-alt w-6"></i> Calendário
            </a>
            <a href="configuracoes.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-solid fa-gear w-6"></i> Configurações
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="btn-sair" class="flex items-center w-full px-4 py-2 text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-right-from-bracket w-6"></i> Sair
            </button>
        </div>
    </aside>

    <!-- Conteúdo Principal -->
    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold text-gray-800">Calendário de Reservas</h1>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition text-sm flex items-center">
                <i class="fa-solid fa-plus mr-2"></i> Bloquear Data
            </button>
        </header>

        <!-- Área do Calendário -->
        <div class="p-8 h-full">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 h-full">
                <!-- A mágica do calendário vai acontecer dentro desta div abaixo -->
                <div id='calendario-host'></div>
            </div>
        </div>
    </main>

    <!-- Script de Lógica e Conexão -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsQS5f4TK-SWBV22Y6CfAimgAxgeOhcWQ",
            authDomain: "central-do-anfitriao.firebaseapp.com",
            projectId: "central-do-anfitriao",
            storageBucket: "central-do-anfitriao.firebasestorage.app",
            messagingSenderId: "625070810610",
            appId: "1:625070810610:web:9f12968b89c666d332b76b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Verifica se está logado
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('body-calendario').classList.remove('hidden');
                carregarCalendario();
            } else {
                window.location.href = 'login.html';
            }
        });

        // Função que busca no Firebase e monta o Calendário Visual
        async function carregarCalendario() {
            try {
                // 1. Busca todas as reservas no banco
                const querySnapshot = await getDocs(collection(db, "Reserva"));
                const eventos = [];

                // 2. Transforma as reservas do banco no formato que o FullCalendar entende
                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    
                    // Lógica para que a data de checkout no calendário abranja o dia correto
                    let dataCheckout = new Date(dados.data_checkout);
                    dataCheckout.setDate(dataCheckout.getDate() + 1); 
                    const checkoutFormatado = dataCheckout.toISOString().split('T')[0];

                    eventos.push({
                        id: doc.id,
                        title: `${dados.quantidade_hospedes} Hóspedes`,
                        start: dados.data_checkin,
                        end: checkoutFormatado, // Data de fim no FullCalendar é exclusiva
                        color: dados.status === 'pendente' ? '#eab308' : '#2563eb', // Amarelo se pendente, Azul se confirmada
                        allDay: true
                    });
                });

                // 3. Renderiza (desenha) o calendário na tela
                var calendarEl = document.getElementById('calendario-host');
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: 'pt-br', // Deixa tudo em português
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,dayGridWeek'
                    },
                    buttonText: {
                        today: 'Hoje',
                        month: 'Mês',
                        week: 'Semana'
                    },
                    events: eventos, // Passa a nossa lista de reservas pro calendário
                    eventClick: function(info) {
                        alert('Reserva ID: ' + info.event.id + '\nDatas: ' + info.event.startStr + ' até ' + info.event.endStr);
                    }
                });

                calendar.render();

            } catch (error) {
                console.error("Erro ao carregar reservas pro calendário:", error);
                alert("Erro ao carregar calendário.");
            }
        }

        // Logout
        document.getElementById('btn-sair').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        });
    </script>

    <!-- Um pouquinho de CSS para deixar o calendário combinando com o seu layout -->
    <style>
        .fc-theme-standard td, .fc-theme-standard th { border-color: #f3f4f6; }
        .fc .fc-button-primary { background-color: #2563eb; border-color: #2563eb; }
        .fc .fc-button-primary:hover { background-color: #1d4ed8; border-color: #1d4ed8; }
        .fc .fc-daygrid-day.fc-day-today { background-color: #eff6ff; }
        .fc-event { cursor: pointer; border: none; padding: 2px 4px; border-radius: 4px; font-size: 0.8em;}
    </style>
</body>
</html>
