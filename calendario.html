<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário - Central do Anfitrião</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden hidden" id="body-calendario">

    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <i class="fa-solid fa-house-chimney text-blue-500 text-xl mr-2"></i>
            <span class="font-bold text-lg">Central Anfitrião</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-solid fa-chart-pie w-6"></i> Dashboard
            </a>
            <a href="calendario.html" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg">
                <i class="fa-regular fa-calendar-alt w-6"></i> Calendário
            </a>
            <a href="configuracoes.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">
                <i class="fa-solid fa-house-user w-6"></i> Meus Imóveis
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <button id="btn-sair" class="flex items-center w-full px-4 py-2 text-gray-400 hover:text-white transition">
                <i class="fa-solid fa-arrow-right-from-bracket w-6"></i> Sair
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-y-auto">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8">
            <h1 class="text-xl font-semibold text-gray-800">Calendário Integrado</h1>
            <span class="text-sm text-gray-500">Exibindo reservas de todo o portfólio</span>
        </header>

        <div class="p-8 h-full">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 h-full">
                <div id='calendario-host'></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBsQS5f4TK-SWBV22Y6CfAimgAxgeOhcWQ",
            authDomain: "central-do-anfitriao.firebaseapp.com",
            projectId: "central-do-anfitriao",
            storageBucket: "central-do-anfitriao.firebasestorage.app",
            messagingSenderId: "625070810610",
            appId: "1:625070810610:web:9f12968b89c666d332b76b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let usuarioLogadoUid = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('body-calendario').classList.remove('hidden');
                usuarioLogadoUid = user.uid;
                carregarCalendario();
            } else {
                window.location.href = 'login.html';
            }
        });

        async function carregarCalendario() {
            try {
                // PASSO 1: Descobrir os imóveis deste anfitrião
                const qImoveis = query(collection(db, "Imoveis"), where("id_anfitriao", "==", usuarioLogadoUid));
                const snapImoveis = await getDocs(qImoveis);
                const idsMeusImoveis = [];
                
                snapImoveis.forEach(doc => { idsMeusImoveis.push(doc.id); });

                if (idsMeusImoveis.length === 0) {
                    renderizarFullCalendar([]); // Calendário vazio se não tiver imóveis
                    return;
                }

                // PASSO 2: Buscar as reservas APENAS desses imóveis
                const promessasDeBusca = idsMeusImoveis.map(idImovel => {
                    const qReserva = query(collection(db, "Reserva"), where("id_imovel", "==", idImovel));
                    return getDocs(qReserva);
                });

                const resultadosBusca = await Promise.all(promessasDeBusca);
                const eventos = [];

                // PASSO 3: Montar os eventos para o FullCalendar
                resultadosBusca.forEach(snapReserva => {
                    snapReserva.forEach(doc => {
                        const dados = doc.data();
                        
                        let dataCheckout = new Date(dados.data_checkout);
                        dataCheckout.setDate(dataCheckout.getDate() + 1); 
                        const checkoutFormatado = dataCheckout.toISOString().split('T')[0];

                        eventos.push({
                            id: doc.id,
                            // O título agora mostra o nome da casa + quantidade de hóspedes
                            title: `${dados.titulo_imovel || 'Imóvel'} (${dados.quantidade_hospedes} Hósp.)`,
                            start: dados.data_checkin,
                            end: checkoutFormatado,
                            color: dados.status === 'pendente' ? '#eab308' : '#2563eb',
                            allDay: true
                        });
                    });
                });

                renderizarFullCalendar(eventos);

            } catch (error) {
                console.error("Erro ao carregar reservas pro calendário:", error);
                alert("Erro ao carregar calendário.");
            }
        }

        function renderizarFullCalendar(eventosParaMostrar) {
            var calendarEl = document.getElementById('calendario-host');
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'pt-br',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,dayGridWeek'
                },
                buttonText: {
                    today: 'Hoje',
                    month: 'Mês',
                    week: 'Semana'
                },
                events: eventosParaMostrar,
                eventClick: function(info) {
                    alert('Reserva: ' + info.event.title + '\nDatas: ' + info.event.startStr + ' até ' + info.event.endStr);
                }
            });
            calendar.render();
        }

        document.getElementById('btn-sair').addEventListener('click', () => {
            signOut(auth).then(() => window.location.href = 'login.html');
        });
    </script>

    <style>
        .fc-theme-standard td, .fc-theme-standard th { border-color: #f3f4f6; }
        .fc .fc-button-primary { background-color: #2563eb; border-color: #2563eb; }
        .fc .fc-button-primary:hover { background-color: #1d4ed8; border-color: #1d4ed8; }
        .fc .fc-daygrid-day.fc-day-today { background-color: #eff6ff; }
        .fc-event { cursor: pointer; border: none; padding: 2px 4px; border-radius: 4px; font-size: 0.8em; font-weight: bold;}
    </style>
</body>
</html>
